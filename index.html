<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta Caliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Cargamos Cinzel Decorative para el título y Montserrat para el resto -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark-gold: #996515; --black: #0a0a0a; --dark-gray: #1a1a1a; }
        body { background-color: var(--black); color: white; font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        html, body {
            /* Usamos dvh para que se adapte dinámicamente a las barras del móvil */
            height: 100dvh; 
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed;
            width: 100%;
            background-color: #0a0a0a;
        }

        .tab-content {
            /* Forzamos a que el contenido ocupe el alto dinámico disponible */
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom); /* Espacio extra para el notch inferior de iPhone */
        }

        /* Ajuste para que los botones inferiores tengan aire y no se peguen al borde */
        .nav-buttons-container {
            padding-bottom: 20px; 
            background: linear-gradient(transparent, #0a0a0a);
        }

        /* Permitir scroll SOLO en la lista del historial */
        #history-list-container {
            flex: 1;
            overflow-y: auto; /* Solo aquí se permite deslizar */
            -webkit-overflow-scrolling: touch; /* Suavidad en iOS */
            padding-bottom: 80px; /* Espacio para no chocar con los botones inferiores */
        }

        /* Ajuste para que la ruleta no se corte en pantallas pequeñas */
        #roulette-view {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .header-title { 
            font-family: 'Great Vibes', cursive; 
            color: var(--gold); 
            text-align: center; 
            padding: 20px 0; 
            letter-spacing: 1px; /* Reducido para que las letras cursivas se unan mejor */
            /* text-transform: uppercase;  <-- ELIMINA O COMENTA ESTA LÍNEA */
            font-size: 3rem; /* Aumentado para mayor legibilidad */
        }

        /* Clase para ocultar los puntos con una transición suave */
        .dots-hidden {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .main-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; position: relative; }
        
        /* Ruleta */
        .wheel-wrapper { position: relative; width: 340px; height: 340px; margin-bottom: 25px; }
        .wheel-pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; 
            border-top: 30px solid var(--gold); z-index: 10; filter: drop-shadow(0 0 5px rgba(0,0,0,0.8));
        }
        canvas { width: 100%; height: 100%; border-radius: 50%; border: 5px solid var(--gold); box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }

        #result-text { font-size: 1.3rem; text-align: center; color: var(--gold); min-height: 3.5rem; font-weight: 700; padding: 0 15px; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .btn-gold { background: linear-gradient(45deg, var(--dark-gold), var(--gold)); border: none; color: black; font-weight: bold; padding: 15px 50px; border-radius: 40px; text-transform: uppercase; font-size: 1.1rem; }
        
        .progress-dots { display: flex; gap: 12px; margin-bottom: 25px; }
        .dot { width: 12px; height: 12px; border: 1px solid var(--gold); border-radius: 50%; transition: 0.5s; }
        .dot.active { background-color: var(--gold); box-shadow: 0 0 12px var(--gold); }

        /* Navegación Inferior con Iconos Grandes */
        .bottom-nav { background-color: var(--dark-gray); border-top: 1px solid #333; display: flex; justify-content: space-around; padding: 15px 0; }
        .nav-item { color: var(--gold); text-decoration: none; font-size: 0.9rem; text-align: center; cursor: pointer; transition: 0.3s; flex: 1; }
        .nav-item span { font-size: 2rem; display: block; margin-bottom: 5px; }
        .nav-item.disabled { color: #444; pointer-events: none; opacity: 0.3; }
        
        .screen { display: none; width: 100%; height: 100%; padding: 25px; overflow-y: auto; position: absolute; top: 0; left: 0; background: var(--black); z-index: 20; }
        .screen.active { display: block; }
    </style>
</head>
<body>

    <h1 class="header-title">Ruleta Caliente</h1>

    <div class="main-container">
        <div class="wheel-wrapper">
            <div class="wheel-pointer"></div>
            <canvas id="wheelCanvas" width="600" height="600"></canvas>
        </div>

        <div id="result-text">Toca el botón para empezar</div>

        <div class="progress-dots" id="dots-container">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>

        <button id="spin-button" class="btn btn-gold" onclick="spin()">GIRAR</button>
    </div>

    <!-- Pantalla Historial -->
    <div id="history-screen" class="screen">
        <h2 id="history-title" style="color: var(--gold); font-family: 'Great Vibes'; font-size: 2.5rem; text-align: center;">Nuestra Trayectoria</h2>
        <div id="history-list-container"></div>
        <div class="text-center mt-5">
            <button onclick="showScreen('home')" class="btn btn-outline-warning">Cerrar</button>
            <button onclick="devReset()" class="btn btn-link text-danger mt-3 d-block mx-auto" style="text-decoration: none; font-size: 0.8rem; opacity: 0.4;">Limpiar Datos</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="showScreen('history')"><span>📋</span>Historial</div>
        <div id="hot-mode-btn" class="nav-item disabled" onclick="toggleHotMode()"><span id="hot-icon">🔒</span>Modo Hot</div>
    </nav>

    <script>
        // Definición de retos: Texto para ruleta (short) y texto para resultado (full)
        const challenges = [
            { short: "Nata", full: "Nata por el cuerpo" },
            { short: "Roles 👮", full: "¿Roleamos?" },
            { short: "Vendaje", full: "Vendaje en los ojos" },
            { short: "Aceite", full: "Masaje con aceite" },
            { short: "Mandas 👑", full: "Hoy tu mandas" },
            { short: "Ducha 💧", full: "Ducha... Jejeje" },
            { short: "Streptease 🕺", full: "Streptease Mario" },
            { short: "Streptease 💃", full: "Streptease Maria" },
            { short: "Besos ", full: "Matarte a besos" },
            { short: "Sin manos 🚫", full: "Prohibido usar las manos" },
            { short: "Silla ", full: "Castigada en una silla" },
            { short: "Permiso ", full: "Pide permiso a todo" },
            { short: "Hielo 🧊", full: "Hielo" }
        ];

        const hotChallenges = [
            { short: "Atada ⛓️", full: "Totalmente atada" },
            { short: "Toys 🧸", full: "Juguetes al fallo" },
            { short: "Duro 🥵", full: "Bien duro" },
            { short: "Traje", full: "Trajecito bien sexy" },
            { short: "Squirt 💦", full: "Squirt hasta morir" },
            { short: "Esclavo 🐶", full: "Esclava/Esclavo" }
        ];

        let currentChallenges = [...challenges];
        let history = JSON.parse(localStorage.getItem('rouletteHistory')) || [];
        let isHotMode = false;
        let currentRotation = 0;

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');

        function drawWheel() {
            const numSegments = currentChallenges.length;
            const angle = 2 * Math.PI / numSegments;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            currentChallenges.forEach((obj, i) => {
                ctx.save();
                ctx.translate(300, 300);
                // Ajustamos el dibujo para que el primer segmento esté centrado respecto al eje vertical
                ctx.rotate(i * angle - Math.PI / 2 - angle / 2);
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, 290, 0, angle);
                ctx.fillStyle = i % 2 === 0 ? "#0a0a0a" : "#1a1a1a";
                ctx.fill();
                ctx.strokeStyle = "#D4AF37";
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.rotate(angle / 2);
                ctx.fillStyle = "#D4AF37";
                ctx.font = "bold 24px Montserrat"; 
                ctx.textAlign = "right";
                ctx.fillText(obj.short, 250, 10); 
                ctx.restore();
            });
        }

        function spin() {
            const btn = document.getElementById('spin-button');
            if (btn.disabled) return;
            btn.disabled = true;

            const numSegments = currentChallenges.length;
            const segmentAngle = 360 / numSegments;
            const winIndex = Math.floor(Math.random() * numSegments);
            const winnerObj = currentChallenges[winIndex];

            const rotationToTarget = (numSegments - winIndex) * segmentAngle;
            currentRotation += 3600 + (rotationToTarget - (currentRotation % 360));
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                // Comprobar si el reto ya está en el historial
                const isRepeated = history.some(h => h.challenge === winnerObj.full);

                if (isRepeated) {
                    const modal = document.getElementById('repeat-modal');
                    modal.classList.remove('d-none');
                    
                    // Opción 1: Aceptar repetido (se guarda normalmente)
                    document.getElementById('accept-repeat').onclick = () => {
                        modal.classList.add('d-none');
                        finalizeSpin(winnerObj);
                    };
                    
                    // Opción 2: Volver a tirar (no se guarda nada, se habilita el botón)
                    document.getElementById('re-spin').onclick = () => {
                        modal.classList.add('d-none');
                        btn.disabled = false;
                        document.getElementById('result-text').innerText = "¡PRUEBA DE NUEVO!";
                    };
                } else {
                    finalizeSpin(winnerObj);
                }
            }, 4000);
        }

        // Función auxiliar para guardar el resultado
        function finalizeSpin(winnerObj) {
            document.getElementById('result-text').innerHTML = "RESULTADO:<br><span style='color:white'>" + winnerObj.full.toUpperCase() + "</span>";
            
            const now = new Date();
            history.push({ 
                date: now.toLocaleDateString() + " " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), 
                challenge: winnerObj.full,
                isHot: isHotMode 
            });
            localStorage.setItem('rouletteHistory', JSON.stringify(history));
            
            if (isHotMode) toggleHotMode();
            
            document.getElementById('spin-button').disabled = false;
            updateUI();
        }

        function updateUI() {
            // Filtramos el historial para contar cuántos retos normales han pasado desde el último Hot
            const lastHotIndex = [...history].reverse().findIndex(h => h.isHot);
            const normalSpinsSinceLastHot = lastHotIndex === -1 ? history.length : lastHotIndex;
            
            // Actualizamos los dots (máximo 5) basados en ese conteo
            document.querySelectorAll('.dot').forEach((dot, i) => {
                if (i < normalSpinsSinceLastHot) dot.classList.add('active');
                else dot.classList.remove('active');
            });

            const hotBtn = document.getElementById('hot-mode-btn');
            const hotIcon = document.getElementById('hot-icon');

            // Solo se desbloquea si hay 5 o más retos normales acumulados
            if (normalSpinsSinceLastHot >= 5) {
                hotBtn.classList.remove('disabled');
                if (!isHotMode) hotIcon.innerText = '🔥';
            } else {
                hotBtn.classList.add('disabled');
                if (!isHotMode) hotIcon.innerText = '🔒';
            }

            // Renderizado de "Nuestra Trayectoria"
            const histCont = document.getElementById('history-list-container');
            histCont.innerHTML = history.slice().reverse().map(h => `
                <div style="border-bottom:1px solid #333; padding:15px; display:flex; justify-content:space-between; font-size: 0.9rem">
                    <span style="opacity:0.6">${h.date}</span>
                    <span style="color:var(--gold); font-weight:bold">
                        ${h.isHot ? '🔥 ' : ''}${h.challenge}
                    </span>
                </div>`).join('');
        }

        function toggleHotMode() {
            isHotMode = !isHotMode;
            const dotsContainer = document.getElementById('dots-container');
            
            // Cambiamos la lista de retos y redibujamos
            currentChallenges = isHotMode ? [...hotChallenges] : [...challenges];
            drawWheel();

            if (isHotMode) {
                // Activamos estética Hot y ocultamos puntos
                document.body.style.background = "radial-gradient(circle, #2a0000 0%, #000 100%)";
                document.getElementById('hot-icon').innerText = '⚡';
                dotsContainer.classList.add('dots-hidden');
            } else {
                // Volvemos a estética Normal y mostramos puntos
                document.body.style.background = "#0a0a0a";
                document.getElementById('hot-icon').innerText = '🔥';
                dotsContainer.classList.remove('dots-hidden');
            }
            
            updateUI();
        }

        function clearHistory() {
            if(confirm("¿Reiniciar progreso y borrar historial?")) {
                history = [];
                localStorage.removeItem('rouletteHistory');
                isHotMode = false;
                currentChallenges = [...challenges];
                drawWheel();
                updateUI();
            }
        }

        function showScreen(type) {
            document.getElementById('history-screen').classList.toggle('active', type === 'history');
        }

        // --- NUEVA LÓGICA DE RESET PARA DESARROLLADOR (CÓDIGO: 3006) ---
        function devReset() {
            const pin = prompt("Introduce el código de desarrollador para resetear la app:");
            if (pin === "3006") {
                history = [];
                localStorage.removeItem('rouletteHistory');
                isHotMode = false;
                currentChallenges = [...challenges];
                document.body.style.background = "#0a0a0a";
                document.getElementById('hot-icon').innerText = '🔒';
                document.getElementById('hot-mode-btn').classList.add('disabled');
                drawWheel();
                updateUI();
                alert("Sistema reiniciado con éxito, Mario.");
            } else {
                alert("Código incorrecto.");
            }
        }

        drawWheel();
        updateUI();
    </script>

    <!-- Modal de Reto Repetido -->
    <div id="repeat-modal" class="d-none" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px;">
        <div style="border: 2px solid var(--gold); padding: 30px; background: #111; border-radius: 15px; max-width: 400px;">
            <h3 style="color: var(--gold); font-family: 'Great Vibes'; font-size: 2rem;">¡Ya salió!</h3>
            <p style="color: white; margin: 20px 0;">Este reto ya lo habéis hecho anteriormente. ¿Queréis repetirlo o probar suerte de nuevo?</p>
            <button id="accept-repeat" class="btn btn-outline-warning m-2">Aceptar Repetido</button>
            <button id="re-spin" class="btn btn-warning m-2">Volver a tirar</button>
        </div>
    </div>

</body>
</html>
