<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ruleta Caliente v1.3</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4AF37; --dark-gold: #996515; --black: #0a0a0a; --dark-gray: #1a1a1a; }

        html, body {
            height: 100dvh; margin: 0; padding: 0; overflow: hidden;
            position: fixed; width: 100%; background-color: var(--black);
            color: white; font-family: 'Montserrat', sans-serif;
        }

        .app-viewport {
            height: 100dvh; display: flex; flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .header-title { 
            font-family: 'Great Vibes', cursive; color: var(--gold); 
            text-align: center; padding: 15px 0 5px 0; font-size: 2.5rem;
        }

        .main-container { 
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 5px;
            margin-bottom: 60px; 
        }

        .wheel-wrapper { 
            position: relative; width: 75vw; max-width: 280px; 
            aspect-ratio: 1/1; margin-bottom: 15px; 
        }
        
        .wheel-pointer { 
            position: absolute; top: -12px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; 
            border-top: 25px solid var(--gold); z-index: 10;
        }

        canvas { width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--gold); transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }

        #result-text { font-size: 1.1rem; text-align: center; color: var(--gold); min-height: 2.5rem; font-weight: 700; }

        .btn-gold { 
            background: linear-gradient(45deg, var(--dark-gold), var(--gold)); 
            border: none; color: black; font-weight: bold; padding: 10px 35px; border-radius: 40px; 
        }

        .progress-dots { display: flex; gap: 10px; margin-bottom: 15px; }
        .dot { width: 10px; height: 10px; border: 1px solid var(--gold); border-radius: 50%; }
        .dot.active { background-color: var(--gold); box-shadow: 0 0 8px var(--gold); }

        /* NAVEGACIÓN INFERIOR */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%;
            background-color: var(--dark-gray); border-top: 1px solid #333; 
            display: flex; justify-content: space-around; 
            padding: 10px 0 calc(env(safe-area-inset-bottom) + 15px) 0; 
            z-index: 50;
        }

        .nav-item { color: var(--gold); text-decoration: none; font-size: 0.75rem; text-align: center; cursor: pointer; flex: 1; }
        .nav-item span { font-size: 1.5rem; display: block; }
        .nav-item.disabled { color: #444 !important; opacity: 0.4; cursor: default; }

        /* PANTALLAS MODALES (HISTORIAL Y AJUSTES) */
        .screen { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; padding: 25px; 
            background: var(--black); z-index: 2000; 
            overflow-y: auto;
        }
        .screen.active { display: block; }

        .list-container {
            height: 50vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
            margin-top: 15px; border: 1px solid #333; padding: 10px; border-radius: 8px;
        }

        .dots-hidden { visibility: hidden; }
        
        /* Estilos CRUD */
        .challenge-item {
            background: #111; border: 1px solid #222; padding: 10px; 
            margin-bottom: 8px; border-radius: 6px; display: flex; 
            justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

    <div class="app-viewport">
        <h1 class="header-title">Ruleta Caliente</h1>

        <div class="main-container">
            <div class="wheel-wrapper">
                <div class="wheel-pointer"></div>
                <canvas id="wheelCanvas" width="600" height="600"></canvas>
            </div>
            <div id="result-text">Toca el botón para empezar</div>
            <div class="progress-dots" id="dots-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <button id="spin-button" class="btn btn-gold" onclick="spin()">GIRAR</button>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item" onclick="showScreen('history')"><span>📋</span>Historial</div>
            <div class="nav-item" onclick="showScreen('settings')"><span>⚙️</span>Ajustes</div>
            <div id="hot-mode-btn" class="nav-item disabled" onclick="toggleHotMode()"><span id="hot-icon">🔒</span>Modo Hot</div>
        </nav>
    </div>

    <!-- Pantalla Historial -->
    <div id="history-screen" class="screen">
        <h2 style="color: var(--gold); font-family: 'Great Vibes'; font-size: 2.5rem; text-align: center;">Nuestro Historial</h2>
        <div id="history-list-container" class="list-container"></div>
        <div class="text-center mt-4">
            <button onclick="showScreen('home')" class="btn btn-outline-warning">Volver</button>
        </div>
    </div>

    <!-- Pantalla Ajustes / CRUD -->
    <div id="settings-screen" class="screen">
        <h2 style="color: var(--gold); font-family: 'Great Vibes'; font-size: 2.5rem; text-align: center;">Gestión de Retos</h2>
        
        <!-- Selector de Modo -->
        <div class="d-flex justify-content-center gap-2 my-3">
            <button id="btn-edit-normal" class="btn btn-warning btn-sm" onclick="switchCrudMode('normal')">Retos Normales</button>
            <button id="btn-edit-hot" class="btn btn-outline-danger btn-sm" onclick="switchCrudMode('hot')">🔒 Retos Hot</button>
        </div>

        <!-- Formulario Añadir -->
        <div class="p-2 bg-dark rounded mb-3">
            <div class="row g-2">
                <div class="col-4">
                    <input type="text" id="input-short" class="form-control form-control-sm bg-secondary text-white" placeholder="Corto (Ruleta)">
                </div>
                <div class="col-6">
                    <input type="text" id="input-full" class="form-control form-control-sm bg-secondary text-white" placeholder="Reto Completo">
                </div>
                <div class="col-2">
                    <button onclick="addChallenge()" class="btn btn-success btn-sm w-100">Añadir</button>
                </div>
            </div>
        </div>

        <!-- Lista editable -->
        <div id="crud-list-container" class="list-container"></div>

        <div class="text-center mt-4 d-flex justify-content-around">
            <button onclick="showScreen('home')" class="btn btn-outline-warning">Guardar y Volver</button>
            <button onclick="devReset()" class="btn btn-outline-danger btn-sm" style="opacity: 0.5;">Reset Base</button>
        </div>
    </div>

    <script>
        // Listas por defecto si no hay nada guardado
        const defaultChallenges = [{short:"Nata",full:"Nata por el cuerpo"},{short:"Roles 👮",full:"¿Roleamos?"},{short:"Vendaje",full:"Vendaje en los ojos"},{short:"Aceite",full:"Masaje con aceite"},{short:"Mandas 👑",full:"Hoy tu mandas"},{short:"Ducha 💧",full:"Ducha... Jejeje"},{short:"Streptease 🕺",full:"Streptease Mario"},{short:"Streptease 💃",full:"Streptease Maria"},{short:"Besos ",full:"Matarte a besos"},{short:"Sin manos 🚫",full:"Prohibido usar las manos"},{short:"Silla ",full:"Castigada en una silla"},{short:"Permiso ",full:"Pide permiso a todo"},{short:"Hielo 🧊",full:"Hielo"}];
        const defaultHotChallenges = [{short:"Atada ⛓️",full:"Totalmente atada"},{short:"Toys 🧸",full:"Juguetes al fallo"},{short:"Duro 🥵",full:"Bien duro"},{short:"Traje",full:"Trajecito bien sexy"},{short:"Squirt 💦",full:"Squirt hasta morir"},{short:"Esclavo 🐶",full:"Esclava/Esclavo"}];

        // Carga inicial desde LocalStorage o por defecto
        let challenges = JSON.parse(localStorage.getItem('customChallenges')) || defaultChallenges;
        let hotChallenges = JSON.parse(localStorage.getItem('customHotChallenges')) || defaultHotChallenges;
        let history = JSON.parse(localStorage.getItem('rouletteHistory')) || [];
        
        let currentChallenges = [...challenges];
        let isHotMode = false;
        let currentRotation = 0;
        let activeCrudMode = 'normal'; // 'normal' o 'hot'

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');

        function drawWheel() {
            const numSegments = currentChallenges.length;
            if(numSegments === 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }
            const angle = 2 * Math.PI / numSegments;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            currentChallenges.forEach((obj, i) => {
                ctx.save();
                ctx.translate(300, 300);
                ctx.rotate(i * angle - Math.PI / 2 - angle / 2);
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.arc(0, 0, 290, 0, angle);
                ctx.fillStyle = i % 2 === 0 ? "#0a0a0a" : "#1a1a1a";
                ctx.fill(); ctx.strokeStyle = "#D4AF37"; ctx.stroke();
                ctx.rotate(angle / 2); ctx.fillStyle = "#D4AF37";
                ctx.font = "bold 20px Montserrat"; ctx.textAlign = "right";
                ctx.fillText(obj.short, 250, 7); ctx.restore();
            });
        }

        function spin() {
            if (currentChallenges.length === 0) return alert("¡Añade algún reto primero!");
            const btn = document.getElementById('spin-button');
            if (btn.disabled) return;
            btn.disabled = true;
            const numSegments = currentChallenges.length;
            const winIndex = Math.floor(Math.random() * numSegments);
            const winnerObj = currentChallenges[winIndex];
            const rotationToTarget = (numSegments - winIndex) * (360 / numSegments);
            currentRotation += 3600 + (rotationToTarget - (currentRotation % 360));
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            setTimeout(() => { finalizeSpin(winnerObj); btn.disabled = false; }, 4000);
        }

        function finalizeSpin(winnerObj) {
            document.getElementById('result-text').innerHTML = "RESULTADO:<br><span style='color:white'>" + winnerObj.full.toUpperCase() + "</span>";
            const now = new Date();
            history.push({ date: now.toLocaleString(), challenge: winnerObj.full, isHot: isHotMode });
            localStorage.setItem('rouletteHistory', JSON.stringify(history));
            if (isHotMode) toggleHotMode();
            updateUI();
        }

        function updateUI() {
            const lastHotIdx = [...history].reverse().findIndex(h => h.isHot);
            const spinsSinceHot = lastHotIdx === -1 ? history.length : lastHotIdx;
            
            document.querySelectorAll('.dot').forEach((dot, i) => {
                i < spinsSinceHot ? dot.classList.add('active') : dot.classList.remove('active');
            });

            const hotBtn = document.getElementById('hot-mode-btn');
            const hotIcon = document.getElementById('hot-icon');

            if (spinsSinceHot >= 5) {
                hotBtn.classList.remove('disabled');
                if (!isHotMode) hotIcon.innerText = '🔥';
            } else {
                hotBtn.classList.add('disabled');
                if (!isHotMode) hotIcon.innerText = '🔒';
            }

            const histCont = document.getElementById('history-list-container');
            histCont.innerHTML = history.slice().reverse().map(h => `
                <div style="border-bottom:1px solid #333; padding:12px; display:flex; justify-content:space-between; font-size: 0.8rem">
                    <span style="opacity:0.6">${h.date.split(' ')[1] || h.date}</span>
                    <span style="color:var(--gold); font-weight:bold">${h.isHot ? '🔥 ' : ''}${h.challenge}</span>
                </div>`).join('');
        }

        function toggleHotMode() {
            const spinsSinceHot = [...history].reverse().findIndex(h => h.isHot);
            const count = spinsSinceHot === -1 ? history.length : spinsSinceHot;
            
            if (!isHotMode && count < 5) return;

            isHotMode = !isHotMode;
            document.body.style.backgroundImage = isHotMode ? "url('degradado.png')" : "none";
            document.body.style.backgroundSize = "cover";
            document.getElementById('hot-icon').innerText = isHotMode ? '⚡' : (count >= 5 ? '🔥' : '🔒');
            document.getElementById('dots-container').classList.toggle('dots-hidden', isHotMode);
            currentChallenges = isHotMode ? [...hotChallenges] : [...challenges];
            drawWheel();
        }

        function showScreen(type) {
            document.getElementById('history-screen').classList.toggle('active', type === 'history');
            document.getElementById('settings-screen').classList.toggle('active', type === 'settings');
            if (type === 'home') {
                // Al volver a la home, recargamos la ruleta por si hubo cambios en la lista activa
                currentChallenges = isHotMode ? [...hotChallenges] : [...challenges];
                drawWheel();
            } else if (type === 'settings') {
                renderCrudList();
            }
        }

        /* --- SISTEMA CRUD (CREAR, MODIFICAR, BORRAR) --- */

        function switchCrudMode(mode) {
            if (mode === 'hot' && activeCrudMode !== 'hot') {
                const pass = prompt("Introduce el código de seguridad para acceder a la lista Hot:");
                if (pass !== "3006") {
                    alert("Código incorrecto. Acceso denegado.");
                    return;
                }
            }
            activeCrudMode = mode;
            
            // Estilos de pestañas
            document.getElementById('btn-edit-normal').className = mode === 'normal' ? "btn btn-warning btn-sm" : "btn btn-outline-warning btn-sm";
            document.getElementById('btn-edit-hot').className = mode === 'hot' ? "btn btn-danger btn-sm" : "btn btn-outline-danger btn-sm";
            
            renderCrudList();
        }

        function renderCrudList() {
            const container = document.getElementById('crud-list-container');
            const targetList = activeCrudMode === 'normal' ? challenges : hotChallenges;
            
            if(targetList.length === 0) {
                container.innerHTML = `<p class="text-center opacity-50 mt-4">No hay retos en esta lista.</p>`;
                return;
            }

            container.innerHTML = targetList.map((item, index) => `
                <div class="challenge-item">
                    <div style="flex: 1; display: flex; gap: 10px;">
                        <input type="text" value="${item.short}" class="form-control form-control-sm bg-dark text-white border-secondary" style="width: 30%" onchange="updateChallenge(${index}, 'short', this.value)">
                        <input type="text" value="${item.full}" class="form-control form-control-sm bg-dark text-white border-secondary" style="width: 65%" onchange="updateChallenge(${index}, 'full', this.value)">
                    </div>
                    <button onclick="deleteChallenge(${index})" class="btn btn-sm btn-outline-danger ms-2">🗑️</button>
                </div>
            `).join('');
        }

        function addChallenge() {
            const shortIn = document.getElementById('input-short');
            const fullIn = document.getElementById('input-full');
            
            if(!shortIn.value || !fullIn.value) return alert("Rellena ambos campos");

            const newChallenge = { short: shortIn.value, full: fullIn.value };
            
            if (activeCrudMode === 'normal') {
                challenges.push(newChallenge);
                localStorage.setItem('customChallenges', JSON.stringify(challenges));
            } else {
                hotChallenges.push(newChallenge);
                localStorage.setItem('customHotChallenges', JSON.stringify(hotChallenges));
            }

            shortIn.value = '';
            fullIn.value = '';
            renderCrudList();
        }

        function updateChallenge(index, field, value) {
            if (activeCrudMode === 'normal') {
                challenges[index][field] = value;
                localStorage.setItem('customChallenges', JSON.stringify(challenges));
            } else {
                hotChallenges[index][field] = value;
                localStorage.setItem('customHotChallenges', JSON.stringify(hotChallenges));
            }
        }

        function deleteChallenge(index) {
            if (activeCrudMode === 'normal') {
                challenges.splice(index, 1);
                localStorage.setItem('customChallenges', JSON.stringify(challenges));
            } else {
                hotChallenges.splice(index, 1);
                localStorage.setItem('customHotChallenges', JSON.stringify(hotChallenges));
            }
            renderCrudList();
        }

        function devReset() {
            if (confirm("¿Seguro que quieres borrar el historial y devolver las listas a su estado original?")) {
                localStorage.clear();
                challenges = [...defaultChallenges];
                hotChallenges = [...defaultHotChallenges];
                history = [];
                activeCrudMode = 'normal';
                window.location.reload();
            }
        }

        window.onload = () => { drawWheel(); updateUI(); };
    </script>
</body>
</html>
